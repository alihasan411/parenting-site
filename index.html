u<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parenting</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

:root{
  --bg:#0f172a;
  --text:#fff;
  --card:#1e293b;
  --primary:#22c55e;
  --hero1:#14532d;
  --hero2:#22c55e;
}

/* LIGHT MODE */
body.light{
  --bg:#f5f7fa;
  --text:#111;
  --card:#fff;
}

/* BODY */
body{
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:var(--card);
  flex-wrap:wrap;
}

nav{
  display:flex;
  gap:15px;
}

nav a{
  text-decoration:none;
  color:var(--text);
  font-weight:bold;
}

.toggle{
  cursor:pointer;
  font-size:18px;
}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px;
  background:linear-gradient(135deg,var(--hero1),var(--hero2));
}

.hero h1{
  font-size:28px;
  transition:0.5s;
}

.hero p{
  opacity:0.8;
  margin-top:10px;
  transition:0.5s;
}

.hero button{
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:white;
  color:#14532d;
  cursor:pointer;
}

/* CARDS */
.section{padding:30px 20px;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{padding:15px;}

.card button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  background:var(--primary);
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:30px;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:300px;
}

/* MOBILE */
@media(max-width:600px){
  nav{
    width:100%;
    justify-content:center;
    margin-top:10px;
  }
}



/* PREMIUM CARD EFFECT */
.card{
  position:relative;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}

.card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:15px;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,0.2),transparent);
  opacity:0;
  transition:0.5s;
}

.card:hover::before{
  opacity:1;
}

.card:hover{
  transform:translateY(-12px) scale(1.02);
}



.card button{
  background:linear-gradient(45deg,#22c55e,#4ade80);
  transition:0.3s;
}

.card button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(34,197,94,0.6);
}



</style>
</head>

<body>

<header>
  <h3>Smart Parenting</h3>

  <nav>
    <a href="#">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="toggle" onclick="toggleMode()">🌙</div>
</header>

<!-- HERO -->
<section class="hero">
  <h1><span id="typing"></span><span class="cursor">|</span></h1>
  <p id="heroSub">in Digital World</p>
  <button onclick="scrollToProjects()">Explore</button>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
<h2 style="text-align:center;margin-bottom:20px;">Parenting Tips</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1588072432836-e10032774350">
<div class="card-content">
<h3>Screen Time</h3>
<button class="viewBtn" data-text="• Limit screen time<br>• No mobile at night<br>• Encourage outdoor play<br>• Be a role model">
View
</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b">
<div class="card-content">
<h3>Confidence</h3>
<button class="viewBtn" data-text="• Encourage kids to speak<br>• Appreciate small efforts<br>• Avoid over scolding<br>• Build confidence daily">
View
</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1509062522246-3755977927d7">
<div class="card-content">
<h3>Healthy Life</h3>
<button class="viewBtn" data-text="• Daily outdoor activities<br>• Healthy eating habits<br>• Reduce junk food<br>• Stay physically active">
View
</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1584697964358-3e14ca57658b">
<div class="card-content">
<h3>Learning</h3>
<button class="viewBtn" data-text="• Use educational apps<br>• Monitor screen content<br>• Study routine<br>• Practical learning">
View
</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1513258496099-48168024aec0">
<div class="card-content">
<h3>Discipline</h3>
<button class="viewBtn" data-text="• Set daily routine<br>• Teach respect<br>• Follow rules<br>• Consistency is key">
View
</button>
</div>
</div>

</div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
<h2>Contact</h2>
<p>📞 0300-1234567</p>
<p>📧 alihassanayesha752@gmail.com</p>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <p id="modalText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* DARK MODE */
function toggleMode(){
  document.body.classList.toggle("light");
}

/* SCROLL */
function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({
    behavior:"smooth"
  });
}

/* MODAL */
function openModal(text){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalText").innerHTML=text;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* BUTTON FIX (IMPORTANT) */
document.querySelectorAll(".viewBtn").forEach(btn=>{
  btn.addEventListener("click", function(){
    const text = this.getAttribute("data-text");
    openModal(text);
  });
});

/* HERO TEXT FLOW */
const texts = [
  "Raise Strong Kids",
  "Guide Kids Smartly",
  "Build Strong Future"
];

const subTexts = [
  "in Digital World",
  "Modern Parenting Tips",
  "Smart Parenting Guide"
];

let i = 0;

setInterval(()=>{
  i = (i+1)%texts.length;
  document.getElementById("heroText").innerText = texts[i];
  document.getElementById("heroSub").innerText = subTexts[i];
},2500);



window.addEventListener("scroll", ()=>{
  document.querySelectorAll(".reveal").forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 50){
      el.classList.add("active");
    }
  });
});

</script>

</body>
</html>
