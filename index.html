<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parenting</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}

:root{
  --bg:#0f172a;
  --text:#fff;
  --card:#1e293b;
  --primary:#22c55e;
}

body{
  background:var(--bg);
  color:var(--text);
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#020617;
  position:sticky;
  top:0;
}

nav a{
  margin:0 10px;
  color:#fff;
  text-decoration:none;
}

nav a:hover{
  color:var(--primary);
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px;
  background:linear-gradient(135deg,#22c55e,#4ade80);
}

.hero h1{
  font-size:28px;
}

.hero span{
  display:block;
  margin-top:10px;
  font-size:18px;
  opacity:0.8;
}

.hero button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#fff;
  color:#000;
  cursor:pointer;
}

/* CARDS */
.section{padding:30px 20px;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:var(--card);
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{padding:15px;}

.card button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  background:var(--primary);
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}

/* CONTACT */
.contact{
  padding:30px;
  text-align:center;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:10px;
  max-width:300px;
}

</style>
</head>

<body>

<header>
  <h3>Smart Parenting</h3>
  <nav>
    <a href="#">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1 id="heroText">Raise Strong Kids</h1>
  <span id="heroSub">in Digital World</span>
  <button onclick="scrollToProjects()">Explore</button>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
  <h2 style="text-align:center;margin-bottom:20px;">Parenting Tips</h2>

  <div class="cards">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1588072432836-e10032774350">
      <div class="card-content">
        <h3>Screen Time</h3>
        <button onclick="openModal('Limit screen time and encourage outdoor activities')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b">
      <div class="card-content">
        <h3>Confidence</h3>
        <button onclick="openModal('Help kids speak and build confidence')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7">
      <div class="card-content">
        <h3>Healthy Life</h3>
        <button onclick="openModal('Outdoor play and healthy food habits')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1584697964358-3e14ca57658b">
      <div class="card-content">
        <h3>Smart Learning</h3>
        <button onclick="openModal('Use educational apps wisely')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1513258496099-48168024aec0">
      <div class="card-content">
        <h3>Discipline</h3>
        <button onclick="openModal('Teach routine and discipline')">View</button>
      </div>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>📞 0300-1234567</p>
  <p>📧 ali@email.com</p>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <p id="modalText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

/* SCROLL */
function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}

/* MODAL */
function openModal(text){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalText").innerHTML=text;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

/* HERO TEXT ANIMATION */
const texts = [
  "Raise Strong Kids",
  "Guide Kids in Digital Age"
];

let i=0;

setInterval(()=>{
  i=(i+1)%texts.length;
  document.getElementById("heroText").innerText=texts[i];
},2000);

</script>

</body>
</html>
