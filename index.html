<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Parenting</title>

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}

body{
  background:#0f172a;
  color:#fff;
  transition:0.3s;
}

/* LIGHT MODE */
body.light{
  background:#f5f7fa;
  color:#111;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#020617;
}

nav{
  display:flex;
  gap:15px;
}

nav a{
  text-decoration:none;
  color:#fff;
}

body.light nav a{
  color:#000;
}

.toggle{
  cursor:pointer;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  background:linear-gradient(135deg,#020617,#111827);
}

body.light .hero{
  background:linear-gradient(135deg,#e2e8f0,#cbd5e1);
}

.hero h1{
  animation:move 2s infinite alternate;
}

@keyframes move{
  from{transform:translateY(-20px);}
  to{transform:translateY(20px);}
}

.hero button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  background:#22c55e;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

/* CARDS */
.section{padding:30px;}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

body.light .card{
  background:#fff;
}

.card:hover{
  transform:translateY(-10px);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.card button{
  margin-top:10px;
  padding:8px 15px;
  border:none;
  background:#22c55e;
  color:#fff;
  border-radius:5px;
  cursor:pointer;
}

/* CONTACT */
.contact{
  padding:30px;
  text-align:center;
}

/* MODAL */
.modal{
  display:none;
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:10px;
  max-width:300px;
}

</style>
</head>

<body>

<header>
  <h3>Smart Parenting</h3>

  <nav>
    <a href="#">Home</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="toggle" onclick="toggleMode()">🌙</div>
</header>

<!-- HERO -->
<section class="hero">
  <h1 id="heroText">Raise Strong Kids</h1>
<p id="heroSub">in Digital World</p>
  <button onclick="scrollToProjects()">Explore</button>
</section>

<!-- PROJECTS -->
<section id="projects" class="section">
  <h2 style="text-align:center">Projects</h2>

  <div class="cards">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1588072432836-e10032774350">
      <div class="card-content">
        <h3>Screen Time</h3>
        <button onclick="openModal('Limit mobile usage and encourage outdoor activities')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503676260728-1c00da094a0b">
      <div class="card-content">
        <h3>Confidence</h3>
        <button onclick="openModal('Help kids build confidence and speak freely')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1509062522246-3755977927d7">
      <div class="card-content">
        <h3>Healthy Life</h3>
        <button onclick="openModal('Outdoor games and healthy lifestyle')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1584697964358-3e14ca57658b">
      <div class="card-content">
        <h3>Learning</h3>
        <button onclick="openModal('Use apps wisely and study regularly')">View</button>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1513258496099-48168024aec0">
      <div class="card-content">
        <h3>Discipline</h3>
        <button onclick="openModal('Teach routine and good habits')">View</button>
      </div>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>📞 0300-1234567</p>
  <p>📧 alihassanayesha752@gmail.com</p>
</section>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <p id="modalText"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

function toggleMode(){
  document.body.classList.toggle("light");
}

function scrollToProjects(){
  document.getElementById("projects").scrollIntoView({behavior:"smooth"});
}

function openModal(text){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalText").innerHTML=text;
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}



const texts = [
  "Raise Strong Kids",
  "Guide Kids in Digital Age"
];

const subTexts = [
  "in Digital World",
  "Smart Parenting Tips"
];

let i = 0;

setInterval(()=>{
  i = (i + 1) % texts.length;

  document.getElementById("heroText").innerText = texts[i];
  document.getElementById("heroSub").innerText = subTexts[i];

}, 2000);

</script>

</body>
</html>
